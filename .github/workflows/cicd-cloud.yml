name: CI/CD — Netlify + Render

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Tests ───────────────────────────────────────────────────
  test:
    name: Tests backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Ejecutar tests
        working-directory: backend
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/test_db
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: test
          JWT_SECRET: test-secret-key-256bits-for-ci-only
          SPRING_MAIL_HOST: localhost
          SPRING_MAIL_PORT: 1025
          APP_CORS_ALLOWED_ORIGINS: http://localhost:4200
        run: mvn test --no-transfer-progress

  # ── 2. Backend → Render ────────────────────────────────────────
  deploy-backend:
    name: Deploy backend (Render)
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy en Render
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

  # ── 3. Frontend → Netlify ──────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend (Netlify)
    needs: deploy-backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        working-directory: frontend
        run: npm ci

      - name: Inyectar URL del backend (Render)
        working-directory: frontend
        run: |
          sed -i "s|BACKEND_URL|${{ secrets.RENDER_BACKEND_URL }}|g" \
            src/environments/environment.prod.ts

      - name: Build Angular (producción)
        working-directory: frontend
        run: npx ng build --configuration production

      - name: Deploy a Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: frontend/dist/acciones-frontend/browser
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
