server:
  port: 8080

spring:
  application:
    name: gateway

  cloud:
    gateway:
      routes:
        - id: auth-security-service
          uri: lb://auth-security-service
          predicates:
            - Path=/auth/**

        - id: portfolio-query-service
          uri: lb://portfolio-query-service
          predicates:
            - Path=/portfolio/**

        - id: subscription-collection-service
          uri: lb://subscription-collection-service
          predicates:
            - Path=/subscription/**

        - id: configuration-service
          uri: lb://configuration-service
          predicates:
            - Path=/configuration/**

        - id: market-data-service
          uri: lb://market-data-service
          predicates:
            - Path=/market/**

        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/order/**

        - id: mailing-service
          uri: lb://mailing-service
          predicates:
            - Path=/mailing/**

        - id: audit-compliance-service
          uri: lb://audit-compliance-service
          predicates:
            - Path=/audit/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info