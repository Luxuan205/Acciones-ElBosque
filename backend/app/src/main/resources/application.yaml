server:
  port: 8080

spring:
  application:
    name: acciones-elbosque

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  cache:
    type: simple

  jpa:
    hibernate:
      ddl-auto: none
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    out-of-order: false

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

app:
  jwt:
    secret: ${JWT_SECRET:ThisIsA256BitDevSecretForLocalTestingPurposesOnly1234}
  verification:
    base-url: ${APP_VERIFICATION_BASE_URL:http://localhost:8080}
  login:
    max-attempts: ${APP_LOGIN_MAX_ATTEMPTS:5}
    lock-minutes: ${APP_LOGIN_LOCK_MINUTES:30}
    otp-ttl-minutes: ${APP_LOGIN_OTP_TTL_MINUTES:5}
    session-ttl-minutes: ${APP_LOGIN_SESSION_TTL_MINUTES:5}
    max-resends: ${APP_LOGIN_MAX_RESENDS:3}
    resend-window-minutes: ${APP_LOGIN_RESEND_WINDOW_MINUTES:5}
  market:
    yahoo-finance:
      base-url: https://query1.finance.yahoo.com
      refresh-interval-ms: 1800000
      symbol-mapping:
        PFBCOLOM:  PFBCOLOM.CL
        NUTRESA:   NUTRESA.CL
        ISA:       ISA.CL
        ECOPETROL: ECOPETROL.CL
        CEMARGOS:  CEMARGOS.CL
        GRUPOSURA: GRUPOSURA.CL
        EXITO:     EXITO.CL
        ETB:       ETB.CL
        PFDAVVNDA: PFDAVVNDA.CL
        CLH:       CLH.CL

management:
  endpoints:
    web:
      exposure:
        include: health,info
