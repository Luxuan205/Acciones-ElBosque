services:

  # ── Base de datos ──────────────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: acciones-postgres
    environment:
      POSTGRES_DB: acciones_db
      POSTGRES_USER: acciones
      POSTGRES_PASSWORD: acciones123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acciones -d acciones_db"]
      interval: 5s
      timeout: 3s
      retries: 15
    networks:
      - acciones-network

  # ── Fake SMTP (MailHog) ────────────────────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: acciones-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - acciones-network

  # ── Backend Spring Boot ────────────────────────────────────────
  app:
    build:
      context: ./backend
      dockerfile: app/Dockerfile.dev
    container_name: acciones-backend
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/acciones_db
      SPRING_DATASOURCE_USERNAME: acciones
      SPRING_DATASOURCE_PASSWORD: acciones123
      JWT_SECRET: ThisIsA256BitDevSecretForLocalTestingPurposesOnly1234
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
    volumes:
      - m2_cache:/root/.m2
    networks:
      - acciones-network

  # ── Frontend Angular ───────────────────────────────────────────
  frontend:
    image: node:22-alpine
    container_name: acciones-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "4200:4200"
    command: sh -c "npm install && npx ng serve --host 0.0.0.0 --port 4200 --disable-host-check --poll 500"
    networks:
      - acciones-network

volumes:
  postgres_data:
  m2_cache:
  frontend_node_modules:

networks:
  acciones-network:
    driver: bridge
