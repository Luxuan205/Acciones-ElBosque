services:

  # ─────────────────────────────────────────
  # SPRING CLOUD
  # ─────────────────────────────────────────

  configuration-service:
    build:
      context: ./backend/configuration-service
      dockerfile: Dockerfile.dev
    container_name: configuration-service
    restart: unless-stopped
    ports:
      - "8888:8888"
    networks:
      - acciones-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  eureka-server:
    build:
      context: ./backend/eureka-server
      dockerfile: Dockerfile.dev
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      CONFIG_SERVER_URL: http://configuration-service:8888
    depends_on:
      configuration-service:
        condition: service_healthy
    networks:
      - acciones-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile.dev
    container_name: gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      CONFIG_SERVER_URL: http://configuration-service:8888
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - acciones-network

  # ─────────────────────────────────────────
  # MICROSERVICIOS
  # ─────────────────────────────────────────

  auth-security-service:
    build:
      context: ./backend/auth-security-service
      dockerfile: Dockerfile.dev
    container_name: auth-security-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      - ./backend/auth-security-service:/app
      - m2_cache:/root/.m2
    environment:
      SPRING_DATASOURCE_URL: ${AUTH_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${SUPABASE_USER}
      SPRING_DATASOURCE_PASSWORD: ${SUPABASE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - acciones-network
    command: >
      sh -c "sed -i 's/\r$//' mvnw &&
             chmod +x mvnw &&
             ./mvnw spring-boot:run"

  portfolio-query-service:
    build:
      context: ./backend/portfolio-query-service
      dockerfile: Dockerfile.dev
    container_name: portfolio-query-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    volumes:
      - ./backend/portfolio-query-service:/app
      - m2_cache:/root/.m2
    environment:
      SPRING_DATASOURCE_URL: ${PORTFOLIO_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${SUPABASE_USER}
      SPRING_DATASOURCE_PASSWORD: ${SUPABASE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_DATA_REDIS_URL: ${UPSTASH_REDIS_URL}
      SPRING_DATA_REDIS_SSL_ENABLED: "true"
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - acciones-network
    command: >
      sh -c "sed -i 's/\r$//' mvnw &&
             chmod +x mvnw &&
             ./mvnw spring-boot:run"

  subscription-collection-service:
    build:
      context: ./backend/subscription-collection-service
      dockerfile: Dockerfile.dev
    container_name: subscription-collection-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    volumes:
      - ./backend/subscription-collection-service:/app
      - m2_cache:/root/.m2
    environment:
      SPRING_DATASOURCE_URL: ${SUBSCRIPTION_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${SUPABASE_USER}
      SPRING_DATASOURCE_PASSWORD: ${SUPABASE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - acciones-network
    command: >
      sh -c "sed -i 's/\r$//' mvnw &&
             chmod +x mvnw &&
             ./mvnw spring-boot:run"

  market-data-service:
    build:
      context: ./backend/market-data-service
      dockerfile: Dockerfile.dev
    container_name: market-data-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    volumes:
      - ./backend/market-data-service:/app
      - m2_cache:/root/.m2
    environment:
      SPRING_DATA_REDIS_URL: ${UPSTASH_REDIS_URL}
      SPRING_DATA_REDIS_SSL_ENABLED: "true"
      POLYGON_API_KEY: ${POLYGON_API_KEY}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - acciones-network
    command: >
      sh -c "sed -i 's/\r$//' mvnw &&
             chmod +x mvnw &&
             ./mvnw spring-boot:run"

  order-service:
    build:
      context: ./backend/order-service
      dockerfile: Dockerfile.dev
    container_name: order-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    volumes:
      - ./backend/order-service:/app
      - m2_cache:/root/.m2
    environment:
      SPRING_DATASOURCE_URL: ${ORDER_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${SUPABASE_USER}
      SPRING_DATASOURCE_PASSWORD: ${SUPABASE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - acciones-network
    command: >
      sh -c "sed -i 's/\r$//' mvnw &&
             chmod +x mvnw &&
             ./mvnw spring-boot:run"

  mailing-service:
    build:
      context: ./backend/mailing-service
      dockerfile: Dockerfile.dev
    container_name: mailing-service
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - ./backend/mailing-service:/app
      - m2_cache:/root/.m2
    environment:
      SPRING_MAIL_HOST: smtp.gmail.com
      SPRING_MAIL_PORT: 587
      SPRING_MAIL_USERNAME: ${MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${MAIL_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - acciones-network
    command: >
      sh -c "sed -i 's/\r$//' mvnw &&
             chmod +x mvnw &&
             ./mvnw spring-boot:run"

  audit-compliance-service:
    build:
      context: ./backend/audit-compliance-service
      dockerfile: Dockerfile.dev
    container_name: audit-compliance-service
    restart: unless-stopped
    ports:
      - "8087:8087"
    volumes:
      - ./backend/audit-compliance-service:/app
      - m2_cache:/root/.m2
    environment:
      SPRING_ELASTICSEARCH_URIS: ${ELASTIC_URL}
      SPRING_ELASTICSEARCH_USERNAME: ${ELASTIC_USERNAME}
      SPRING_ELASTICSEARCH_PASSWORD: ${ELASTIC_PASSWORD}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
    depends_on:
      eureka-server:
        condition: service_healthy
    networks:
      - acciones-network
    command: >
      sh -c "sed -i 's/\r$//' mvnw &&
             chmod +x mvnw &&
             ./mvnw spring-boot:run"

# ─────────────────────────────────────────
# VOLÚMENES Y RED
# ─────────────────────────────────────────

volumes:
  m2_cache:

networks:
  acciones-network:
    driver: bridge